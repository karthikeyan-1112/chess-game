<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CHESS ONLINE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Lobster&display=swap"
      rel="stylesheet"
    />
    

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
            :root {
              --light-square: #a05c3f;
              --dark-square: #c8ae76;
              --highlight: #6fdd6f;
              --valid-move: #85d58588;
              --last-move: #edffed6b;
              --capture-move: #cc555566;
            }
            body {
              margin: 0;
              font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
              background: #242933;
              color: #ffe;
              min-height: 100vh;
            }
            .container {
              display: flex;
              flex-direction: row;
              gap: 36px;
              justify-content: center;
              margin-top: 24px;
              flex-wrap: wrap;
            }

            .chessboard {
              display: grid;
              grid-template-columns: repeat(8, 70px);
              grid-template-rows: repeat(8, 70px);
              border: 4px solid #333; /* thicker border */
              border-radius: 12px;
              box-shadow: 0 8px 32px #0009;
              background: #181c20;
              position: relative; /* for coordinates */
            }
            .square {
              width: 72px;
              height: 72px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 3em;
              position: relative;
              cursor: pointer;
              user-select: none;
            }
            .white {
              background: var(--light-square);
            }
            .black {
              background: var(--dark-square);
            }
            .selected {
              box-shadow: 0 0 0 4px var(--highlight) inset;
            }
            .valid-move {
              box-shadow: 0 0 0 4px var(--valid-move) inset;
            }
            .last-move {
              background: var(--last-move) !important;
            }
            .capture::before {
              content: "";
              position: absolute;
              left: 0;
              top: 0;
              width: 100%;
              height: 100%;
              border-radius: 50%;
              background: var(--capture-move);
              z-index: 1;
            }
            .piece:hover {
              filter: drop-shadow(0 0 6px rgb(190, 189, 182));
              cursor: pointer;
            }

            .white-piece {
              color: #fff !important;
              text-shadow: 0 1px 4px #adadad22, 0 0 1px #9997;
              font-weight: 50;
            }
            .black-piece {
              color: #1a1a1a !important;
              text-shadow: 0 0 1px #0008;
              font-weight: 50;
            }
            .ui-panel {
              background: #181c20cc;
              border-radius: 10px;
              box-shadow: 0 2px 18px #0007;
              padding: 18px 14px;
              width: 260px;
              display: flex;
              flex-direction: column;
              gap: 18px;
              min-width: 260px;
              max-width: 95vw;
            }
            .major-btn-group {
              display: flex;
              flex-direction: column;
              gap: 9px;
            }
            button {
              padding: 10px 0;
              font-size: 1em;
              border: none;
              background: linear-gradient(135deg, #b1d0d8, #28ccd2);
              color: #fff;
              font-weight: 600;
              box-shadow: 0 3px 10px #4a6e4a99;
              border-radius: 8px;
              cursor: pointer;
              transition: background 0.3s ease, color 0.3s ease;
            }
            button:hover {
              background: linear-gradient(135deg, #00e1ffd7, #d64bec);
              color: #fff;
            }

            .move-history {
              font-family: "JetBrains Mono", "Courier New", monospace;
              font-size: 1em;
              background: #242933;
              color: #e0e0d9;
              border-radius: 5px;
              max-width: 100%;
              white-space: nowrap;
              overflow-x: auto;
              overflow-y: hidden;
              padding: 5px 8px;
              margin-bottom: 12px;
              box-shadow: inset 0 0 10px #3a4a2f99;
            }
            .status-bar {
              padding: 10px 0;
              margin-bottom: 10px;
              font-weight: 700;
              border-radius: 10px;
              text-align: center;
              font-family: "Press+Start+2P", cursive;
              font-size: 1.9em;
              min-height: 32px;
            }

            .select-promotion {
              display: flex;
              gap: 12px;
              align-items: center;
              justify-content: center;
              margin: 16px 0;
            }
            .promotion-btn {
              font-size: 1.4em;
              background: #a3d3a3;
              color: #264326;
              padding: 10px 16px;
              border-radius: 8px;
              box-shadow: 0 2px 8px #517b36aa;
              cursor: pointer;
              transition: background 0.3s ease;
            }
            .promotion-btn:hover {
              background: #6d8346;
              color: #dae5bd;
            }
            /* Mode selection buttons */
            .mode-select-group {
              display: flex;
              flex-direction: column;
              gap: 10px;
              margin-bottom: 18px;
            }
            .piece-img {
              width: 110%; /* bigger pieces */
              height: 110%;
              margin: auto;
              display: block;
              object-fit: contain;
              object-position: center;
              pointer-events: none;
            }

            .mode-btn {
              background: linear-gradient(135deg, #b1d0d8, #28ccd2);
              color: #e4f0e2;
              border-radius: 10px;
              border: none;
              font-size: 1.1em;
              padding: 12px 0;
              cursor: pointer;
              font-weight: 700;
              box-shadow: 0 3px 10px #385122bb;
              transition: background 0.25s ease;
            }
            .mode-btn.active,
            .mode-btn:active {
              background: linear-gradient(135deg, #b1d0d8, #28ccd2);
              color: #264326;
              box-shadow: 0 3px 10px #517b36cc;
            }
            .confirm-btn {
              font-weight: 700;
              background: #d92d2d;
              color: #d3ead3;
              border-radius: 10px;
              padding: 12px 0;
              cursor: pointer;
              transition: background 0.3s ease;
              box-shadow: 0 5px 10px #00000077;
            }
            .confirm-btn:hover {
              background: #00ff44;
            }
            #sideSelect {
              margin-left: 4px;
              padding: 8px 6px;
              border-radius: 8px;
              border: 1px solid #8da06c;
              width: 75%;
              max-width: 140px;
              background: #557a3e;
              color: #e4f0e2;
              font-weight: 700;
              box-shadow: inset 0 0 5px #3a4a2fbb;
              cursor: pointer;
            }
            @media (max-width: 850px) {
              .container {
                flex-direction: column;
                align-items: center;
              }
              .ui-panel {
                width: 100vw;
                max-width: 350px;
              }
              .chessboard {
                border-radius: 12px;
                box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.4);
              }
              .square {
                box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
              }
              /* Coordinates */
              .square[data-coord-col]::after {
        content: attr(data-coord-col);
        position: absolute;
        bottom: 3px;
        right: 5px;
        font-size: 0.65em;
        font-weight: bold;
        color: #000; /* black color */
      }

              .square[data-coord-row]::before {
        content: attr(data-coord-row);
        position: absolute;
        top: 3px;
        left: 5px;
        font-size: 0.65em;
        font-weight: bold;
        color: #000; /* black color */
      }
    }
    </style>
  </head>
<body>
  <h1 style="text-align:center; letter-spacing: 1px; margin: 14px 0 3px 0; font-family: 'Lobster', cursive; font-size: 2.5em; color: #e4f0e2;">
   👑CHESS ONLINE👑
  </h1>

  <div class="status-bar" id="statusBar">
    Select mode and click Confirm to start the game.
  </div>

  <div class="container">
    <div class="board-panel">
      <div id="chessboard" class="chessboard"></div>
    </div>

    <div class="ui-panel">
      <!-- Reset Button -->
      <div class="major-btn-group">
        <button id="resetBtn">🔁 Reset</button>
      </div>

      <!-- Mode Select Group -->
      <div id="modeSelectGroup" class="mode-select-group">
        <button id="pvpBtn" class="mode-btn active">🙍‍♂️ vs 🙍‍♂️</button>
        <button id="pvbBtn" class="mode-btn">🙍‍♂️ vs 🤖</button>
        <select id="sideSelect" style="display: none">
          <option value="white">Play White</option>
          <option value="black">Play Black</option>
        </select>
        <button id="confirmModeBtn" class="confirm-btn">Confirm</button>
      </div>

      <!-- Eliminated Pieces + Points (hidden until confirm) -->
      <div id="gameStats" style="display: none; margin-top: 15px;">
        <div style="margin-bottom: 8px; font-weight: 600;">Eliminated Pieces</div>
        <div id="eliminatedWhite" style="margin-bottom: 4px;">⚪ White: </div>
        <div id="eliminatedBlack" style="margin-bottom: 10px;">⚫ Black: </div>

        <div style="margin-bottom: 8px; font-weight: 600;">Points</div>
        <div id="pointsWhite" style="margin-bottom: 4px;">⚪ White: 0</div>
        <div id="pointsBlack">⚫ Black: 0</div>
      </div>

      <!-- Move History -->
      <div style="margin-top: 15px;">
        <div style="margin-bottom: 5px; font-weight: 600">Move History</div>
        <div id="moveHistory" class="move-history"></div>
      </div>
    </div>
  </div>

  <!-- Promotion Popup -->
  <div
    id="promotionPopup"
    style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: rgba(20, 20, 30, 0.7);
      z-index: 20;
    "
  >
    <div
      style="
        background: #444;
        border-radius: 15px;
        padding: 26px 32px;
        text-align: center;
        color: var(--light-square);
        max-width: 320px;
      "
    >
      <div style="font-size: 1.4em; margin-bottom: 1em">Choose Promotion</div>
      <div class="select-promotion">
        <button class="promotion-btn" data-piece="queen">♛</button>
        <button class="promotion-btn" data-piece="rook">♜</button>
        <button class="promotion-btn" data-piece="bishop">♝</button>
        <button class="promotion-btn" data-piece="knight">♞</button>
      </div>
    </div>
  </div>

</body>


    <script>
  // Get references to DOM elements
  const modeSelectGroup = document.getElementById("modeSelectGroup");
  const pvpBtn = document.getElementById("pvpBtn");
  const pvbBtn = document.getElementById("pvbBtn");
  const confirmBtn = document.getElementById("confirmModeBtn");
  const sideSelect = document.getElementById("sideSelect");
  const resetBtn = document.getElementById("resetBtn");
  const statusBar = document.getElementById("statusBar");
  const historyPanel = document.getElementById("moveHistory");
  const chessboard = document.getElementById("chessboard");
  const promotionPopup = document.getElementById("promotionPopup");

  // Eliminated pieces + points panels
  const eliminatedWhiteEl = document.getElementById("eliminatedWhite");
  const eliminatedBlackEl = document.getElementById("eliminatedBlack");
  const pointsWhiteEl = document.getElementById("pointsWhite");
  const pointsBlackEl = document.getElementById("pointsBlack");

  // Track eliminated pieces & points
  let eliminatedPieces = { white: [], black: [] };
  let points = { white: 0, black: 0 };

  // Standard chess piece values
  const pieceValues = {
    PAWN: 1,
    KNIGHT: 3,
    BISHOP: 3,
    ROOK: 5,
    QUEEN: 9,
    KING: 0,
  };

  // Unicode symbols mapping by piece type and color
  const pieceImgPath = {
    PAWN: {
      white: "/chess_piece/White_Pawn.svg",
      black: "/chess_piece/Black_Pawn.svg",
    },
    ROOK: {
      white: "/chess_piece/White_Rook.svg",
      black: "/chess_piece/Black_Rook.svg",
    },
    KNIGHT: {
      white: "/chess_piece/White_Knight.svg",
      black: "/chess_piece/Black_Knight.svg",
    },
    BISHOP: {
      white: "/chess_piece/White_Bishop.svg",
      black: "/chess_piece/Black_Bishop.svg",
    },
    QUEEN: {
      white: "/chess_piece/White_Queen.svg",
      black: "/chess_piece/Black_Queen.svg",
    },
    KING: {
      white: "/chess_piece/White_King.svg",
      black: "/chess_piece/Black_King.svg",
    },
  };

  let gameMode = "player"; // 'player' or 'bot'
  let playerSide = "white"; // chosen side if bot
  let modeConfirmed = false;
  let currentTurn = "white";
  let selected = null;
  let moveHistory = [];
  let validMoves = [];
  let lastMove = null;
  let boardState = null;
  let promotionMove = null;
  let gameStarted = false;
  let gameOver = false;

  // ✅ Update eliminated pieces and points
  function updateEliminatedAndPoints(capturedPiece, capturedColor) {
    if (!capturedPiece) return;

    const symbolMap = {
      PAWN: "♟",
      ROOK: "♜",
      KNIGHT: "♞",
      BISHOP: "♝",
      QUEEN: "♛",
      KING: "♚",
    };

    const symbol = symbolMap[capturedPiece.type] || "?";
    eliminatedPieces[capturedColor].push(symbol);

    // Points go to the opponent
    const opponent = capturedColor === "white" ? "black" : "white";
    points[opponent] += pieceValues[capturedPiece.type];

    // Update UI
    eliminatedWhiteEl.textContent = "⚪ White: " + eliminatedPieces.white.join(" ");
    eliminatedBlackEl.textContent = "⚫ Black: " + eliminatedPieces.black.join(" ");
    pointsWhiteEl.textContent = "⚪ White: " + points.white;
    pointsBlackEl.textContent = "⚫ Black: " + points.black;
  }

  // Update active mode button and side selector visibility
  function updateModeButtons() {
    pvpBtn.classList.toggle("active", gameMode === "player");
    pvbBtn.classList.toggle("active", gameMode === "bot");
    sideSelect.style.display = gameMode === "bot" ? "block" : "none";
  }

  // Mode buttons handlers
  pvpBtn.onclick = () => {
    gameMode = "player";
    updateModeButtons();
  };
  pvbBtn.onclick = () => {
    gameMode = "bot";
    updateModeButtons();
  };
  sideSelect.onchange = () => {
    playerSide = sideSelect.value;
  };

  // Capitalize helper
  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  // Confirm button to start game and hide mode selection
  confirmBtn.onclick = () => {
    modeConfirmed = true;
    modeSelectGroup.style.display = "none";

    resetGame().then((success) => {
      if (!success) return;

      gameStarted = true;
      gameOver = false;

      updateStatus(`${capitalize(currentTurn)} to move`);

      if (gameMode === "bot") {
        sideSelect.style.display = "block";
        if (playerSide === "black" && currentTurn === "white") {
          makeBotMove();
        }
      } else {
        sideSelect.style.display = "none";
      }
    });

    // Show stats panel
    document.getElementById("gameStats").style.display = "block";
  };

  // Reset button resets game and shows mode selector again
  resetBtn.onclick = () => {
    resetGame().then((success) => {
      if (!success) return;

      modeConfirmed = false;
      gameStarted = false;
      gameOver = false;

      modeSelectGroup.style.display = "";
      sideSelect.style.display = "none";

      updateStatus("Select mode and click Confirm to start");
      moveHistory = [];
      updateMoveHistory();

      // Reset stats
      eliminatedPieces = { white: [], black: [] };
      points = { white: 0, black: 0 };
      eliminatedWhiteEl.textContent = "⚪ White: ";
      eliminatedBlackEl.textContent = "⚫ Black: ";
      pointsWhiteEl.textContent = "⚪ White: 0";
      pointsBlackEl.textContent = "⚫ Black: 0";

      document.getElementById("gameStats").style.display = "none";
    });
  };

  function updateStatus(msg) {
    statusBar.innerHTML = msg || "";
  }

  function updateMoveHistory() {
    let html = "";
    for (let i = 0; i < moveHistory.length; i += 2) {
      const moveNumber = i / 2 + 1;
      const whiteMove = moveHistory[i] || "";
      const blackMove = moveHistory[i + 1] || "";
      html += `<span>${moveNumber}. ${whiteMove} ${blackMove}</span> `;
    }
    historyPanel.innerHTML = html.trim();
  }

  function getBoardSquare(row, col) {
    return boardState?.[row]?.[col];
  }

  function renderBoard(boardData) {
    chessboard.innerHTML = "";
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const sq = document.createElement("div");
        const isLight = (r + c) % 2 === 0;
        sq.className = "square " + (isLight ? "white" : "black");
        sq.dataset.row = r;
        sq.dataset.col = c;

        if (r === 7) sq.setAttribute("data-coord-col", String.fromCharCode(97 + c));
        if (c === 0) sq.setAttribute("data-coord-row", 8 - r);

        if (
          lastMove &&
          ((r === lastMove.fromRow && c === lastMove.fromCol) ||
            (r === lastMove.toRow && c === lastMove.toCol))
        ) {
          sq.classList.add("last-move");
        }

        const piece = boardData[r][c];
        if (piece) {
          const pieceSpan = document.createElement("span");
          pieceSpan.className =
            "piece " + (piece.color === "white" ? "white-piece" : "black-piece");

          const img = document.createElement("img");
          img.src = pieceImgPath[piece.type][piece.color];
          img.draggable = gameStarted && !gameOver;
          img.className = "piece-img";

          pieceSpan.appendChild(img);
          sq.appendChild(pieceSpan);
        }

        if (selected && selected.row === r && selected.col === c) {
          sq.classList.add("selected");
        }
        if (validMoves.some((m) => m.row === r && m.col === c)) {
          sq.classList.add("valid-move");
          if (piece) {
            sq.classList.add("capture");
          }
        }

        sq.addEventListener("click", () => handleSquareClick(r, c));
        sq.addEventListener("dragover", (e) => e.preventDefault());
        sq.addEventListener("drop", (e) => {
          e.preventDefault();
          handleDrop(r, c);
        });

        chessboard.appendChild(sq);
      }
    }
  }

  function loadBoard() {
    fetch("/board")
      .then((r) => r.json())
      .then((data) => {
        boardState = data;
        renderBoard(data);
      });
  }

  function fetchValidMoves(row, col) {
    fetch("/valid-moves", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ row, col }),
    })
      .then((r) => r.json())
      .then((res) => {
        if (res.success) {
          validMoves = res.validMoves;
          renderBoard(boardState);
        }
      });
  }

  function sendMove(move) {
    hidePromotion();
    fetch("/move", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(move),
    })
      .then((r) => r.json())
      .then((res) => {
        if (res.success) {
          // ✅ Capture handling
          if (res.capturedPiece) {
            updateEliminatedAndPoints(res.capturedPiece, res.capturedPiece.color);
          }

          currentTurn = res.currentTurn;
          lastMove = {
            fromRow: move.fromRow,
            fromCol: move.fromCol,
            toRow: move.toRow,
            toCol: move.toCol,
          };
          selected = null;
          validMoves = [];
          moveHistory = res.moveHistory || moveHistory;
          boardState = null;
          updateMoveHistory();
          handleGameStatus(res.gameStatus);
          loadBoard();
          if (
            gameMode === "bot" &&
            currentTurn !== playerSide &&
            !gameOver
          ) {
            setTimeout(makeBotMove, 600);
          }
        } else {
          alert(res.message);
        }
      })
      .catch(() => alert("Error communicating with server."));
  }

  function makeBotMove() {
    if (gameOver) return;
    fetch("/bot-move", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ color: currentTurn }),
    })
      .then((r) => r.json())
      .then((res) => {
        if (res.success) {
          if (res.capturedPiece) {
            updateEliminatedAndPoints(res.capturedPiece, res.capturedPiece.color);
          }

          lastMove = parseMoveString(res.move);
          currentTurn = res.currentTurn;
          moveHistory = res.moveHistory || moveHistory;
          updateMoveHistory();
          handleGameStatus(res.gameStatus);
          loadBoard();
        } else {
          alert(res.message);
        }
      });
  }

  function parseMoveString(str) {
    if (!str || str.length < 4) return null;
    const fromCol = str.charCodeAt(0) - 97;
    const fromRow = 8 - +str[1];
    const toCol = str.charCodeAt(2) - 97;
    const toRow = 8 - +str[3];
    return { fromRow, fromCol, toRow, toCol };
  }

  function handleSquareClick(row, col) {
    if (!gameStarted || gameOver) return;
    const sq = getBoardSquare(row, col);
    if (!selected) {
      if (!sq) return;
      if (gameMode === "bot" && sq.color !== playerSide) return;
      if (sq.color !== currentTurn) return;
      selected = { row, col, color: sq.color };
      fetchValidMoves(row, col);
    } else {
      if (selected.row === row && selected.col === col) {
        selected = null;
        validMoves = [];
        renderBoard(boardState);
        return;
      }
      if (validMoves.some((m) => m.row === row && m.col === col)) {
        const promotionNeeded =
          (selected.color === "white" && row === 0) ||
          (selected.color === "black" && row === 7);
        if (
          promotionNeeded &&
          getBoardSquare(selected.row, selected.col).type === "PAWN"
        ) {
          promotionMove = {
            fromRow: selected.row,
            fromCol: selected.col,
            toRow: row,
            toCol: col,
            color: selected.color,
          };
          showPromotion();
        } else {
          sendMove({
            fromRow: selected.row,
            fromCol: selected.col,
            toRow: row,
            toCol: col,
            color: selected.color,
          });
        }
      } else {
        selected = null;
        validMoves = [];
        renderBoard(boardState);
      }
    }
  }

  function handleDrop(row, col) {
    if (!selected) return;
    const pawn = getBoardSquare(selected.row, selected.col);
    if (!pawn) return;
    if (validMoves.some((m) => m.row === row && m.col === col)) {
      const promotionRequired =
        (pawn.color === "white" && row === 0) ||
        (pawn.color === "black" && row === 7);
      if (promotionRequired && pawn.type === "PAWN") {
        promotionMove = {
          fromRow: selected.row,
          fromCol: selected.col,
          toRow: row,
          toCol: col,
          color: pawn.color,
        };
        showPromotion();
      } else {
        sendMove({
          fromRow: selected.row,
          fromCol: selected.col,
          toRow: row,
          toCol: col,
          color: pawn.color,
        });
      }
    }
  }

  function hidePromotion() {
    promotionPopup.style.display = "none";
    promotionMove = null;
  }

  function showPromotion() {
    promotionPopup.style.display = "flex";
  }

  promotionPopup.querySelectorAll(".promotion-btn").forEach((btn) => {
    btn.onclick = () => {
      if (!promotionMove) return;
      promotionMove.promotion = btn.dataset.piece;
      sendMove(promotionMove);
      hidePromotion();
    };
  });

  function handleGameStatus(status) {
    if (status.startsWith("checkmate")) {
      gameOver = true;
      const winner = status.includes("white") ? "White" : "Black";
      updateStatus(`${winner} wins by checkmate!`);
    } else if (status === "stalemate") {
      gameOver = true;
      updateStatus("Game drawn by stalemate.");
    } else if (status === "draw") {
      gameOver = true;
      updateStatus("Game drawn.");
    } else if (status.startsWith("check")) {
      updateStatus("Check!");
    } else {
      gameOver = false;
      updateStatus(`${capitalize(currentTurn)} to move`);
    }
  }

  function resetGame() {
    return fetch("/reset", { method: "POST" })
      .then((r) => r.json())
      .then((res) => {
        if (res.success) {
          currentTurn = "white";
          selected = null;
          moveHistory = [];
          validMoves = [];
          lastMove = null;
          boardState = null;
          gameStarted = false;
          gameOver = false;
          updateMoveHistory();
          loadBoard();
          return true;
        }
        return false;
      });
  }

  window.onload = () => {
    updateModeButtons();
    modeSelectGroup.style.display = "";
    sideSelect.style.display = "none";
    updateStatus("Select mode and click Confirm to start");
    loadBoard();
  };
</script>

  </body>
</html>
